name: frontend-ci

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: cp .env.example .env

      - name: Prisma generate
        run: npm run db:generate

      - name: Prisma db push
        run: npm run db:push

      - name: Seed database
        run: npm run seed

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start app (background)
        run: |
          nohup npm run start -- --hostname 127.0.0.1 --port 3020 > /tmp/kanclaw.log 2>&1 &
          echo $! > /tmp/kanclaw.pid

      - name: Wait for health
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3020/api/health >/dev/null; then
              echo "KanClaw is up"
              exit 0
            fi
            sleep 1
          done
          echo "KanClaw did not become ready in time"
          cat /tmp/kanclaw.log || true
          exit 1

      - name: Smoke API
        run: npm run smoke:api

      - name: Dependency audit policy
        run: npm run audit:policy

      - name: Design token audit
        run: npm run audit:design

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kanclaw-server-log
          path: /tmp/kanclaw.log
