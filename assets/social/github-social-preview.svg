<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#000000"/>
  
  <!-- KanClaw - large centered -->
  <text x="640" y="280" fill="#ffffff" font-family="system-ui, sans-serif" font-size="80" font-weight="700" text-anchor="middle">KanClaw</text>
  
  <!-- Tagline -->
  <text x="640" y="340" fill="#888888" font-family="system-ui, sans-serif" font-size="24" font-weight="400" text-anchor="middle">Premium Workspace OS for AI Agent Teams</text>
  
  <!-- Features row -->
  <g transform="translate(340, 400)">
    <rect x="0" y="0" width="150" height="36" rx="18" fill="#111111" stroke="#222222"/>
    <text x="75" y="24" fill="#999999" font-family="system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">AI Agents</text>
    
    <rect x="170" y="0" width="150" height="36" rx="18" fill="#111111" stroke="#222222"/>
    <text x="245" y="24" fill="#999999" font-family="system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Local-First</text>
    
    <rect x="340" y="0" width="150" height="36" rx="18" fill="#111111" stroke="#222222"/>
    <text x="415" y="24" fill="#999999" font-family="system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Memory</text>
    
    <rect x="510" y="0" width="150" height="36" rx="18" fill="#111111" stroke="#222222"/>
    <text x="585" y="24" fill="#999999" font-family="system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Runtime</text>
    
    <rect x="680" y="0" width="150" height="36" rx="18" fill="#111111" stroke="#222222"/>
    <text x="755" y="24" fill="#999999" font-family="system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Board</text>
  </g>
  
  <!-- GitHub -->
  <text x="640" y="560" fill="#444444" font-family="system-ui, sans-serif" font-size="14">github.com/smouj/kanclaw</text>
