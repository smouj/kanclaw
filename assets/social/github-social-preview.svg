<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#000000"/>
  
  <!-- Top badge -->
  <text x="640" y="100" text-anchor="middle" fill="#666666" font-family="system-ui, sans-serif" font-size="14" letter-spacing="4">LIVING WORKSPACE OS</text>
  
  <!-- Main title -->
  <text x="640" y="220" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="72" font-weight="700">KanClaw</text>
  
  <!-- Tagline -->
  <text x="640" y="270" text-anchor="middle" fill="#888888" font-family="system-ui, sans-serif" font-size="20">Premium Workspace OS for AI Agent Teams</text>
  
  <!-- Features - simple row -->
  <g transform="translate(115, 330)">
    <rect x="0" y="0" width="210" height="44" rx="22" fill="#111111" stroke="#222222"/>
    <text x="105" y="28" text-anchor="middle" fill="#aaaaaa" font-family="system-ui, sans-serif" font-size="13" font-weight="500">AI Agents</text>
    
    <rect x="230" y="0" width="210" height="44" rx="22" fill="#111111" stroke="#222222"/>
    <text x="335" y="28" text-anchor="middle" fill="#aaaaaa" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Local-First</text>
    
    <rect x="460" y="0" width="210" height="44" rx="22" fill="#111111" stroke="#222222"/>
    <text x="565" y="28" text-anchor="middle" fill="#aaaaaa" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Memory</text>
    
    <rect x="690" y="0" width="210" height="44" rx="22" fill="#111111" stroke="#222222"/>
    <text x="795" y="28" text-anchor="middle" fill="#aaaaaa" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Runtime</text>
  </g>
  
  <!-- Second row features -->
  <g transform="translate(345, 400)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#0a0a0a" stroke="#1a1a1a"/>
    <text x="90" y="26" text-anchor="middle" fill="#777777" font-family="system-ui, sans-serif" font-size="12">Board</text>
    
    <rect x="200" y="0" width="180" height="40" rx="20" fill="#0a0a0a" stroke="#1a1a1a"/>
    <text x="290" y="26" text-anchor="middle" fill="#777777" font-family="system-ui, sans-serif" font-size="12">GitHub</text>
    
    <rect x="400" y="0" width="180" height="40" rx="20" fill="#0a0a0a" stroke="#1a1a1a"/>
    <text x="490" y="26" text-anchor="middle" fill="#777777" font-family="system-ui, sans-serif" font-size="12">OpenClaw</text>
  </g>
  
  <!-- Footer -->
  <text x="640" y="580" text-anchor="middle" fill="#333333" font-family="system-ui, sans-serif" font-size="14">github.com/smouj/kanclaw</text>
</svg>
